version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gotrackmoney_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: ecom
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecom"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: gotrackmoney_backend
    ports:
      - "8080:8080"
    environment:
      - GOOSE_DBSTRING=host=db user=postgres password=postgrespassword dbname=ecom sslmode=disable
      - AUTH_TOKEN_SECRET=production-secret-change-me-in-real-prod
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: gotrackmoney_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  pgdata:
